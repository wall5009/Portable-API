name: Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: Release channel
        required: true
        default: beta
        type: choice
        options:
          - alpha
          - beta
          - release
      dry_run:
        description: Build and validate without publishing
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Full distribution build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - id: version
        shell: bash
        run: |
          VERSION="$(grep '^version=' gradle.properties | cut -d= -f2)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer project version: $VERSION" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version v$VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Install headless client display support
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Build complete distribution
        run: xvfb-run --auto-servernum ./gradlew clean fullDistributionBuild -PreleaseChannel=${{ inputs.release_channel }} --stacktrace --no-parallel
      - name: Publish API Maven modules
        if: ${{ !inputs.dry_run }}
        env:
          MAVEN_PUBLISH_URL: ${{ secrets.MAVEN_PUBLISH_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          test -n "$MAVEN_PUBLISH_URL"
          test -n "$MAVEN_USERNAME"
          test -n "$MAVEN_PASSWORD"
          ./gradlew publishApiToRemoteRepository --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: portable-api-release-${{ steps.version.outputs.version }}
          if-no-files-found: error
          path: |
            build/release/**
            build/distributions/**

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-api-release-${{ needs.build.outputs.version }}
          path: dist
      - name: Reject duplicate GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "GitHub release v$VERSION already exists." >&2
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Portable API v${{ needs.build.outputs.version }}
          body_path: dist/release/portable-api-${{ needs.build.outputs.version }}/github/RELEASE-NOTES.md
          prerelease: ${{ inputs.release_channel != 'release' }}
          files: |
            dist/release/portable-api-${{ needs.build.outputs.version }}/github/*.jar
            dist/release/portable-api-${{ needs.build.outputs.version }}/github/*.md
            dist/release/portable-api-${{ needs.build.outputs.version }}/github/SHA*SUMS.txt
            dist/distributions/*.zip

  modrinth:
    name: Modrinth API publish ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - fabric-1201
          - forge-1201
          - fabric-1211
          - neoforge-1211
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-api-release-${{ needs.build.outputs.version }}
          path: dist
      - name: Publish API artifact
        run: |
          test -n "$MODRINTH_TOKEN"
          test -n "$MODRINTH_PROJECT_ID"
          TARGET_DIR="dist/release/portable-api-$VERSION/modrinth/${{ matrix.target }}"
          RELEASE_NOTES="dist/release/portable-api-$VERSION/RELEASE-NOTES.md"
          FILE=$(find "$TARGET_DIR" -maxdepth 1 -name '*.jar' | head -n1)
          test -n "$FILE"
          test -s "$RELEASE_NOTES"
          DATA=$(jq --arg project "$MODRINTH_PROJECT_ID" --rawfile changelog "$RELEASE_NOTES" \
            '. + {project_id:$project, featured:false, file_parts:["file"], changelog:$changelog}' \
            "$TARGET_DIR/upload-metadata.json")
          curl --fail-with-body -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$DATA" \
            -F "file=@$FILE"

  curseforge:
    name: CurseForge API publish ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - fabric-1201
          - forge-1201
          - fabric-1211
          - neoforge-1211
    env:
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-api-release-${{ needs.build.outputs.version }}
          path: dist
      - name: Upload API artifact
        run: |
          test -n "$CURSEFORGE_TOKEN"
          test -n "$CURSEFORGE_PROJECT_ID"
          TARGET_DIR="dist/release/portable-api-$VERSION/curseforge/${{ matrix.target }}"
          RELEASE_NOTES="dist/release/portable-api-$VERSION/RELEASE-NOTES.md"
          FILE=$(find "$TARGET_DIR" -maxdepth 1 -name '*.jar' | head -n1)
          test -n "$FILE"
          test -s "$RELEASE_NOTES"
          META=$(mktemp)
          jq --rawfile changelog "$RELEASE_NOTES" \
            '. + {changelog:$changelog, changelogType:"markdown"}' \
            "$TARGET_DIR/upload-metadata.json" > "$META"
          curl --fail-with-body -X POST "https://minecraft.curseforge.com/api/projects/$CURSEFORGE_PROJECT_ID/upload-file" \
            -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            -F "metadata=@$META;type=application/json" \
            -F "file=@$FILE"
