name: Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: Release channel for template distribution
        required: true
        default: beta
        type: choice
        options:
          - alpha
          - beta
          - release
      dry_run:
        description: Build and validate without publishing
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Release build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - id: version
        shell: bash
        run: echo "version=$(grep '^version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
      - name: Run release gate
        run: ./gradlew releaseBuild --stacktrace
      - name: Publish Maven artifacts
        if: ${{ !inputs.dry_run }}
        env:
          MAVEN_PUBLISH_URL: ${{ secrets.MAVEN_PUBLISH_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          test -n "$MAVEN_PUBLISH_URL"
          test -n "$MAVEN_USERNAME"
          test -n "$MAVEN_PASSWORD"
          ./gradlew publishAllPublicationsToRemoteRepository --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: portable-api-release-${{ steps.version.outputs.version }}
          path: |
            **/build/libs/*.jar
            build/staging-maven/**

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-api-release-${{ needs.build.outputs.version }}
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Portable API v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: dist/**/*.jar

  modrinth:
    name: Modrinth template publish ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: fabric-1.20.1
            artifact: portable-api-template-fabric-1201-*.jar
            loaders: '["fabric"]'
            game_versions: '["1.20.1"]'
            title: Portable Template Fabric 1.20.1
          - suffix: forge-1.20.1
            artifact: portable-api-template-forge-1201-*.jar
            loaders: '["forge"]'
            game_versions: '["1.20.1"]'
            title: Portable Template Forge 1.20.1
          - suffix: fabric-1.21.1
            artifact: portable-api-template-fabric-1211-*.jar
            loaders: '["fabric"]'
            game_versions: '["1.21.1"]'
            title: Portable Template Fabric 1.21.1
          - suffix: neoforge-1.21.1
            artifact: portable-api-template-neoforge-1211-*.jar
            loaders: '["neoforge"]'
            game_versions: '["1.21.1"]'
            title: Portable Template NeoForge 1.21.1
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
      MODRINTH_API_PROJECT_ID: ${{ secrets.MODRINTH_API_PROJECT_ID }}
      VERSION: ${{ needs.build.outputs.version }}
      CHANNEL: ${{ inputs.release_channel }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-api-release-${{ needs.build.outputs.version }}
          path: dist
      - name: Publish template artifact
        env:
          LOADERS: ${{ matrix.loaders }}
          GAME_VERSIONS: ${{ matrix.game_versions }}
        run: |
          test -n "$MODRINTH_TOKEN"
          test -n "$MODRINTH_PROJECT_ID"
          test -n "$MODRINTH_API_PROJECT_ID"
          FILE=$(find dist -name '${{ matrix.artifact }}' ! -name '*sources*' ! -name '*javadoc*' | head -n1)
          test -n "$FILE"
          curl --fail-with-body -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data={\"project_id\":\"$MODRINTH_PROJECT_ID\",\"name\":\"${{ matrix.title }} $VERSION\",\"version_number\":\"$VERSION-${{ matrix.suffix }}\",\"version_type\":\"$CHANNEL\",\"loaders\":$LOADERS,\"game_versions\":$GAME_VERSIONS,\"featured\":false,\"dependencies\":[{\"project_id\":\"$MODRINTH_API_PROJECT_ID\",\"dependency_type\":\"required\"}],\"file_parts\":[\"file\"]}" \
            -F "file=@$FILE"

  curseforge:
    name: CurseForge template publish ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: fabric-1.20.1
            artifact: portable-api-template-fabric-1201-*.jar
            game_versions: '["1.20.1","Fabric"]'
            title: Portable Template Fabric 1.20.1
          - suffix: forge-1.20.1
            artifact: portable-api-template-forge-1201-*.jar
            game_versions: '["1.20.1","Forge"]'
            title: Portable Template Forge 1.20.1
          - suffix: fabric-1.21.1
            artifact: portable-api-template-fabric-1211-*.jar
            game_versions: '["1.21.1","Fabric"]'
            title: Portable Template Fabric 1.21.1
          - suffix: neoforge-1.21.1
            artifact: portable-api-template-neoforge-1211-*.jar
            game_versions: '["1.21.1","NeoForge"]'
            title: Portable Template NeoForge 1.21.1
    env:
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
      VERSION: ${{ needs.build.outputs.version }}
      CHANNEL: ${{ inputs.release_channel }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-api-release-${{ needs.build.outputs.version }}
          path: dist
      - name: Upload template artifact
        env:
          GAME_VERSIONS: ${{ matrix.game_versions }}
        run: |
          test -n "$CURSEFORGE_TOKEN"
          test -n "$CURSEFORGE_PROJECT_ID"
          FILE=$(find dist -name '${{ matrix.artifact }}' ! -name '*sources*' ! -name '*javadoc*' | head -n1)
          test -n "$FILE"
          META=$(mktemp)
          printf '{"changelog":"See GitHub release notes.","changelogType":"markdown","displayName":"${{ matrix.title }} %s","releaseType":"%s","gameVersions":%s}' "$VERSION" "$CHANNEL" "$GAME_VERSIONS" > "$META"
          curl --fail-with-body -X POST "https://minecraft.curseforge.com/api/projects/$CURSEFORGE_PROJECT_ID/upload-file" \
            -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            -F "metadata=@$META;type=application/json" \
            -F "file=@$FILE"
