name: CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run policy and unit checks
        run: ./gradlew spotlessCheck test verifyCommonPurity validatePlatformDescriptors checkDocsLinks

  target-builds:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: repository-policy
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fabric 1.20.1
            platform_task: :platforms:fabric-1.20.1:build
            validation_task: :validation:fabric-1.20.1:build
          - name: Forge 1.20.1
            platform_task: :platforms:forge-1.20.1:build
            validation_task: :validation:forge-1.20.1:build
          - name: Fabric 1.21.1
            platform_task: :platforms:fabric-1.21.1:build
            validation_task: :validation:fabric-1.21.1:build
          - name: NeoForge 1.21.1
            platform_task: :platforms:neoforge-1.21.1:build
            validation_task: :validation:neoforge-1.21.1:build
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build target
        run: ./gradlew ${{ matrix.platform_task }} ${{ matrix.validation_task }}

  publish-staging:
    name: Publish staging artifacts
    runs-on: ubuntu-latest
    needs: target-builds
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Publish to local staging repository
        run: ./gradlew publishAllPublicationsToLocalStagingRepository
      - name: Upload staged Maven repository
        uses: actions/upload-artifact@v4
        with:
          name: portable-api-staging-repository
          path: build/staging-repository
