name: Pull Request

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  core:
    name: Core validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Check API, boundaries, compatibility, and generated resources
        run: ./gradlew check checkApiCompatibility dependencyBoundaryCheck validateGeneratedResources --stacktrace

  compile-matrix:
    name: Compile ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: core
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fabric-1201
            tasks: :platform-fabric-1201:compileJava :template-fabric-1201:compileJava
          - target: forge-1201
            tasks: :platform-forge-1201:compileJava :template-forge-1201:compileJava
          - target: fabric-1211
            tasks: :platform-fabric-1211:compileJava :template-fabric-1211:compileJava
          - target: neoforge-1211
            tasks: :platform-neoforge-1211:compileJava :template-neoforge-1211:compileJava
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile target
        run: ./gradlew ${{ matrix.tasks }} --stacktrace

  artifacts:
    name: Runtime automation and distribution dry run
    runs-on: ubuntu-latest
    needs: compile-matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install headless client display support
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Run runtime automation and verify release layout
        run: xvfb-run --auto-servernum ./gradlew runtimeAutomation fullDistributionBuild -PreleaseChannel=beta --stacktrace --no-parallel
      - uses: actions/upload-artifact@v4
        with:
          name: portable-api-pr-artifacts
          if-no-files-found: error
          path: |
            **/build/libs/*.jar
            build/release/**
            build/distributions/**
