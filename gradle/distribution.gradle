import groovy.json.JsonOutput
import java.security.MessageDigest
import java.util.zip.ZipFile

/*
 * Complete release/distribution assembly for Portable API.
 *
 * The public mod-hosting files are the four platform-* runtime JARs. The
 * template JARs are still built and verified, but are placed under developer
 * artifacts rather than the CurseForge/Modrinth upload directories.
 */

