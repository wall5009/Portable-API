plugins {
    id "base"
    id "com.diffplug.spotless" version "8.7.0"
    id "dev.architectury.loom" version "1.14.476" apply false
    id "architectury-plugin" version "3.5.169" apply false
}

def prop = { String name -> providers.gradleProperty(name).get() }
def junitBom = "org.junit:junit-bom:6.1.0"
def apiProject = project(":portable-api")
def runtimeProject = project(":runtime-core")

group = prop("maven_group")
version = prop("mod_version")

allprojects {
    group = rootProject.group
    version = rootProject.version
    repositories {
        maven { url = uri("https://maven.architectury.dev/") }
        maven { url = uri("https://maven.fabricmc.net/") }
        maven { url = uri("https://maven.minecraftforge.net/") }
        maven { url = uri("https://maven.neoforged.net/releases/") }
        mavenCentral()
    }
}

subprojects {
    plugins.withType(JavaPlugin).configureEach {
        tasks.withType(JavaCompile).configureEach {
            options.encoding = "UTF-8"
            options.compilerArgs.addAll(["-Xlint:all", "-Xlint:-processing"])
        }

        tasks.withType(Test).configureEach {
            useJUnitPlatform()
        }
    }
}

spotless {
    java {
        target("**/src/**/*.java")
        googleJavaFormat("1.28.0")
        removeUnusedImports()
        importOrder()
    }
    format("gradle") {
        target("*.gradle", "**/*.gradle")
        trimTrailingWhitespace()
        endWithNewline()
    }
    format("misc") {
        target("*.md", "docs/**/*.md", ".github/**/*.yml", ".github/**/*.yaml", "**/*.json", "**/*.toml", "**/*.properties")
        targetExclude("**/build/**", "**/.gradle/**")
        trimTrailingWhitespace()
        endWithNewline()
    }
}

def configureJavaOnlyProject = { Project p, int javaRelease, String artifactId ->
    p.apply plugin: "java-library"
    p.apply plugin: "maven-publish"

    p.base {
        archivesName = artifactId
    }
    p.java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(javaRelease)
        }
        withJavadocJar()
        withSourcesJar()
    }
    p.tasks.withType(JavaCompile).configureEach {
        options.release = javaRelease
    }
    p.dependencies {
        testImplementation platform(junitBom)
        testImplementation "org.junit.jupiter:junit-jupiter"
        testRuntimeOnly "org.junit.platform:junit-platform-launcher"
    }
    p.publishing {
        publications {
            mavenJava(MavenPublication) {
                from p.components.java
                setArtifactId(artifactId)
                pom {
                    name = artifactId
                    description = prop("mod_description")
                    licenses {
                        license {
                            name = prop("mod_license")
                        }
                    }
                }
            }
        }
        repositories {
            maven {
                name = "localStaging"
                url = rootProject.layout.buildDirectory.dir("staging-repository")
            }
        }
    }
}

configureJavaOnlyProject(apiProject, 17, "portable-api")
configureJavaOnlyProject(runtimeProject, 17, "portable-api-runtime-core")

runtimeProject.dependencies {
    api apiProject
}

def configureCommonProject = { Project p, String minecraftVersion, int javaRelease, List<String> platforms, String artifactId ->
    p.apply plugin: "java-library"
    p.apply plugin: "dev.architectury.loom"
    p.apply plugin: "architectury-plugin"
    p.apply plugin: "maven-publish"

    p.base {
        archivesName = artifactId
    }
    def commonArchitectury = p.extensions.getByName("architectury")
    commonArchitectury.minecraft = minecraftVersion
    commonArchitectury.common(platforms as String[])
    p.java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(javaRelease)
        }
        withSourcesJar()
    }
    p.tasks.withType(JavaCompile).configureEach {
        options.release = javaRelease
    }
    p.dependencies {
        minecraft "com.mojang:minecraft:${minecraftVersion}"
        mappings p.loom.officialMojangMappings()
        api apiProject
        implementation runtimeProject
        testImplementation platform(junitBom)
        testImplementation "org.junit.jupiter:junit-jupiter"
        testRuntimeOnly "org.junit.platform:junit-platform-launcher"
    }
    p.publishing {
        publications {
            mavenJava(MavenPublication) {
                from p.components.java
                setArtifactId(artifactId)
                pom {
                    name = artifactId
                    description = "Portable API internal common adapters for Minecraft ${minecraftVersion}."
                    licenses {
                        license {
                            name = prop("mod_license")
                        }
                    }
                }
            }
        }
        repositories {
            maven {
                name = "localStaging"
                url = rootProject.layout.buildDirectory.dir("staging-repository")
            }
        }
    }
}

configureCommonProject(project(":common:mc1_20_1"), prop("minecraft_1_20_1"), 17, ["fabric", "forge"], "portable-api-common-1.20.1")
configureCommonProject(project(":common:mc1_21_1"), prop("minecraft_1_21_1"), 21, ["fabric", "neoforge"], "portable-api-common-1.21.1")

def configurePlatformProject = { Project p, Map target ->
    p.apply plugin: "java-library"
    p.apply plugin: "dev.architectury.loom"
    p.apply plugin: "architectury-plugin"
    p.apply plugin: "maven-publish"

    Project commonProject = project(target.commonPath)
    String artifactId = "portable-api-${target.loader}-${target.minecraft}"
    String capitalizedLoader = target.loader == "neoforge" ? "NeoForge" : target.loader.capitalize()

    p.base {
        archivesName = artifactId
    }
    def platformArchitectury = p.extensions.getByName("architectury")
    platformArchitectury.minecraft = target.minecraft
    platformArchitectury.platformSetupLoomIde()
    if (target.loader == "fabric") {
        platformArchitectury.fabric()
    } else if (target.loader == "forge") {
        platformArchitectury.forge()
        p.configurations.maybeCreate("forge")
    } else if (target.loader == "neoforge") {
        platformArchitectury.neoForge()
        p.configurations.maybeCreate("neoForge")
    }
    p.java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(target.javaRelease)
        }
        withSourcesJar()
    }
    p.tasks.withType(JavaCompile).configureEach {
        options.release = target.javaRelease
    }

    p.dependencies {
        minecraft "com.mojang:minecraft:${target.minecraft}"
        mappings p.loom.officialMojangMappings()
        implementation apiProject
        implementation runtimeProject
        implementation commonProject
        if (target.loader == "fabric") {
            modImplementation "net.fabricmc:fabric-loader:${prop("fabric_loader")}"
            modImplementation "net.fabricmc.fabric-api:fabric-api:${target.fabricApi}"
        } else if (target.loader == "forge") {
            compileOnly "net.minecraftforge:forge:${target.minecraft}-${target.forgeVersion}:universal"
            compileOnly "net.minecraftforge:javafmllanguage:${target.minecraft}-${target.forgeVersion}"
            compileOnly "net.minecraftforge:fmlloader:${target.minecraft}-${target.forgeVersion}"
            compileOnly "net.minecraftforge:fmlcore:${target.minecraft}-${target.forgeVersion}"
            compileOnly "net.minecraftforge:eventbus:${prop("forge_eventbus_1_20_1")}"
            compileOnly "net.minecraftforge:mergetool:${prop("forge_mergetool_1_20_1")}"
        } else if (target.loader == "neoforge") {
            compileOnly "net.neoforged:neoforge:${target.neoForgeVersion}:universal"
            compileOnly "net.neoforged.fancymodloader:loader:${prop("neoforge_fml_loader_1_21_1")}"
            compileOnly "net.neoforged:bus:${prop("neoforge_bus_1_21_1")}"
            compileOnly "net.neoforged:mergetool:${prop("neoforge_mergetool_1_21_1")}:api"
        }
    }
    if (target.loader == "forge") {
        p.afterEvaluate {
            p.dependencies.add("forge", "net.minecraftforge:forge:${target.minecraft}-${target.forgeVersion}")
        }
    } else if (target.loader == "neoforge") {
        p.afterEvaluate {
            p.dependencies.add("neoForge", "net.neoforged:neoforge:${target.neoForgeVersion}")
        }
    }

    p.tasks.named("processResources", ProcessResources).configure {
        inputs.properties([
                "version": rootProject.version,
                "mod_id": prop("mod_id"),
                "mod_name": prop("mod_name"),
                "mod_description": prop("mod_description"),
                "mod_license": prop("mod_license"),
                "mod_authors": prop("mod_authors"),
                "minecraft_version": target.minecraft,
                "loader": target.loader,
                "fabric_loader": prop("fabric_loader"),
                "fabric_api": target.fabricApi ?: "",
                "forge_version": target.forgeVersion ?: "",
                "neoforge_version": target.neoForgeVersion ?: ""
        ])
        filesMatching(["fabric.mod.json", "META-INF/mods.toml", "META-INF/neoforge.mods.toml", "portable-api-target.properties"]) {
            expand inputs.properties
        }
    }

    p.tasks.named("jar", Jar).configure {
        archiveClassifier = "dev"
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        from(apiProject.sourceSets.main.output)
        from(runtimeProject.sourceSets.main.output)
        from(commonProject.sourceSets.main.output)
    }
    def namedElements = p.configurations.maybeCreate("namedElements")
    namedElements.canBeConsumed = true
    namedElements.canBeResolved = false
    namedElements.outgoing.artifact(p.tasks.named("jar"))
    p.tasks.named("sourcesJar", Jar).configure {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        from(apiProject.sourceSets.main.allSource)
        from(runtimeProject.sourceSets.main.allSource)
        from(commonProject.sourceSets.main.allSource)
    }
    p.tasks.named("remapJar").configure {
        archiveClassifier = ""
        dependsOn p.tasks.named("jar")
    }
    p.tasks.named("build").configure {
        dependsOn p.tasks.named("remapJar")
    }

    p.publishing {
        publications {
            mavenJava(MavenPublication) {
                artifact p.tasks.named("remapJar")
                artifact p.tasks.named("sourcesJar")
                setArtifactId(artifactId)
                pom {
                    name = "${prop("mod_name")} ${target.loader} ${target.minecraft}"
                    description = "${prop("mod_description")} Target: ${target.loader} ${target.minecraft}."
                    licenses {
                        license {
                            name = prop("mod_license")
                        }
                    }
                }
            }
        }
        repositories {
            maven {
                name = "localStaging"
                url = rootProject.layout.buildDirectory.dir("staging-repository")
            }
        }
    }
}

def platformTargets = [
        [path: ":platforms:fabric-1.20.1", loader: "fabric", minecraft: prop("minecraft_1_20_1"), javaRelease: 17, commonPath: ":common:mc1_20_1", fabricApi: prop("fabric_api_1_20_1")],
        [path: ":platforms:forge-1.20.1", loader: "forge", minecraft: prop("minecraft_1_20_1"), javaRelease: 17, commonPath: ":common:mc1_20_1", forgeVersion: prop("forge_1_20_1")],
        [path: ":platforms:fabric-1.21.1", loader: "fabric", minecraft: prop("minecraft_1_21_1"), javaRelease: 21, commonPath: ":common:mc1_21_1", fabricApi: prop("fabric_api_1_21_1")],
        [path: ":platforms:neoforge-1.21.1", loader: "neoforge", minecraft: prop("minecraft_1_21_1"), javaRelease: 21, commonPath: ":common:mc1_21_1", neoForgeVersion: prop("neoforge_1_21_1")]
]
platformTargets.each { configurePlatformProject(project(it.path), it) }

def configureValidationProject = { Project p, Map target ->
    p.apply plugin: "java-library"
    p.apply plugin: "dev.architectury.loom"
    p.apply plugin: "architectury-plugin"

    Project platformProject = project(target.platformPath)
    String artifactId = "portable-api-validation-${target.loader}-${target.minecraft}"

    p.base {
        archivesName = artifactId
    }
    def validationArchitectury = p.extensions.getByName("architectury")
    validationArchitectury.minecraft = target.minecraft
    validationArchitectury.platformSetupLoomIde()
    if (target.loader == "fabric") {
        validationArchitectury.fabric()
    } else if (target.loader == "forge") {
        validationArchitectury.forge()
        p.configurations.maybeCreate("forge")
    } else if (target.loader == "neoforge") {
        validationArchitectury.neoForge()
        p.configurations.maybeCreate("neoForge")
    }
    p.java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(target.javaRelease)
        }
    }
    p.tasks.withType(JavaCompile).configureEach {
        options.release = target.javaRelease
    }
    p.dependencies {
        minecraft "com.mojang:minecraft:${target.minecraft}"
        mappings p.loom.officialMojangMappings()
        compileOnly apiProject
        runtimeOnly p.files(platformProject.tasks.named("remapJar").flatMap { it.archiveFile })
        if (target.loader == "fabric") {
            modImplementation "net.fabricmc:fabric-loader:${prop("fabric_loader")}"
            modImplementation "net.fabricmc.fabric-api:fabric-api:${target.fabricApi}"
        } else if (target.loader == "forge") {
            compileOnly "net.minecraftforge:javafmllanguage:${target.minecraft}-${target.forgeVersion}"
        } else if (target.loader == "neoforge") {
            compileOnly "net.neoforged.fancymodloader:loader:${prop("neoforge_fml_loader_1_21_1")}"
        }
    }
    if (target.loader == "forge") {
        p.afterEvaluate {
            p.dependencies.add("forge", "net.minecraftforge:forge:${target.minecraft}-${target.forgeVersion}")
        }
    } else if (target.loader == "neoforge") {
        p.afterEvaluate {
            p.dependencies.add("neoForge", "net.neoforged:neoforge:${target.neoForgeVersion}")
        }
    }
    p.tasks.named("processResources", ProcessResources).configure {
        inputs.properties([
                "version": rootProject.version,
                "minecraft_version": target.minecraft,
                "loader": target.loader,
                "fabric_loader": prop("fabric_loader"),
                "fabric_api": target.fabricApi ?: "",
                "forge_version": target.forgeVersion ?: "",
                "neoforge_version": target.neoForgeVersion ?: ""
        ])
        filesMatching(["fabric.mod.json", "META-INF/mods.toml", "META-INF/neoforge.mods.toml"]) {
            expand inputs.properties
        }
    }
}

[
        [path: ":validation:fabric-1.20.1", platformPath: ":platforms:fabric-1.20.1", loader: "fabric", minecraft: prop("minecraft_1_20_1"), javaRelease: 17, fabricApi: prop("fabric_api_1_20_1")],
        [path: ":validation:forge-1.20.1", platformPath: ":platforms:forge-1.20.1", loader: "forge", minecraft: prop("minecraft_1_20_1"), javaRelease: 17, forgeVersion: prop("forge_1_20_1")],
        [path: ":validation:fabric-1.21.1", platformPath: ":platforms:fabric-1.21.1", loader: "fabric", minecraft: prop("minecraft_1_21_1"), javaRelease: 21, fabricApi: prop("fabric_api_1_21_1")],
        [path: ":validation:neoforge-1.21.1", platformPath: ":platforms:neoforge-1.21.1", loader: "neoforge", minecraft: prop("minecraft_1_21_1"), javaRelease: 21, neoForgeVersion: prop("neoforge_1_21_1")]
