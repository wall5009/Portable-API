tasks.register("verifyCommonPurity") {
    group = "verification"
    description = "Fails if public API, runtime-core, or versioned common modules depend on loader APIs."
    doLast {
        def checkedProjects = [apiProject, runtimeProject, project(":common:mc1_20_1"), project(":common:mc1_21_1")]
        def bannedImports = [
                "import net.fabricmc.",
                "import net.minecraftforge.",
                "import net.neoforged.",
                "import fuzs.forgeconfigapiport."
        ]
        def bannedGroups = ["net.fabricmc", "net.minecraftforge", "net.neoforged"]
        def sourceDependencyConfigurations = [
                "api",
                "implementation",
                "compileOnly",
                "compileOnlyApi",
                "runtimeOnly",
                "annotationProcessor",
                "testImplementation",
                "testCompileOnly",
                "testRuntimeOnly",
                "testAnnotationProcessor"
        ] as Set
        checkedProjects.each { Project checked ->
            checked.fileTree("src/main/java").matching { include "**/*.java" }.each { File sourceFile ->
                String text = sourceFile.getText("UTF-8")
                bannedImports.each { banned ->
                    if (text.contains(banned)) {
                        throw new GradleException("${checked.path} contains loader import '${banned}' in ${sourceFile}")
                    }
                }
            }
            checked.configurations.each { configuration ->
                if (!sourceDependencyConfigurations.contains(configuration.name)) {
                    return
                }
                configuration.dependencies.each { dependency ->
                    if (dependency.group != null && bannedGroups.any { dependency.group.startsWith(it) }) {
                        throw new GradleException("${checked.path} declares loader dependency ${dependency.group}:${dependency.name} in ${configuration.name}")
                    }
                }
            }
        }
    }
}

tasks.register("validatePlatformDescriptors") {
    group = "verification"
    description = "Verifies all platform descriptors expose the same required v1 contract surface."
    dependsOn platformTargets.collect { "${it.path}:processResources" }
    doLast {
        def expectedRequired = [
                "LIFECYCLE_EVENTS",
                "LOGGING",
                "ENVIRONMENT",
                "SIDED_EXECUTION",
                "CONFIGURATION",
                "COMMANDS",
                "REGISTRIES",
                "REGISTRY_SUPPLIERS",
                "CREATIVE_TAB_POPULATION",
                "RESOURCES",
                "NETWORKING"
        ] as Set
        platformTargets.each { target ->
            File descriptor =
                    project(target.path)
                            .layout.buildDirectory.file("resources/main/portable-api-target.properties")
                            .get()
                            .asFile
            if (!descriptor.isFile()) {
                throw new GradleException("Missing descriptor for ${target.path}: ${descriptor}")
            }
            Properties properties = new Properties()
            descriptor.withInputStream { properties.load(it) }
            Set supported = (properties.getProperty("capabilities.supported") ?: "").split(",").findAll { it }.collect { it.trim() } as Set
            Set limited = (properties.getProperty("capabilities.limited") ?: "").split(",").findAll { it }.collect { it.trim() } as Set
            Set available = supported + limited
            if (!available.containsAll(expectedRequired)) {
                throw new GradleException("${target.path} descriptor is missing required capabilities: ${expectedRequired - available}")
            }
            if (properties.getProperty("minecraft") != target.minecraft || properties.getProperty("loader") != target.loader) {
                throw new GradleException("${target.path} descriptor identity does not match Gradle target")
            }
        }
    }
}

tasks.register("checkDocsLinks") {
    group = "verification"
    description = "Checks relative Markdown links in repository documentation."
    doLast {
        def markdownFiles = fileTree(".").matching {
            include "README.md", "docs/**/*.md", "CONTRIBUTING.md", "CHANGELOG.md"
            exclude "**/build/**", "**/.gradle/**"
        }
        def linkPattern = ~/\[[^\]]+\]\((?!https?:|mailto:|#)([^)]+)\)/
        markdownFiles.each { File md ->
            md.eachLine("UTF-8") { String line, int number ->
                def matcher = line =~ linkPattern
                matcher.each { match ->
                    String rawTarget = match[1].split("#")[0]
                    if (!rawTarget) {
                        return
                    }
                    File resolved = new File(md.parentFile, rawTarget).canonicalFile
                    if (!resolved.exists()) {
                        throw new GradleException("Broken docs link in ${md}:${number} -> ${rawTarget}")
                    }
                }
            }
        }
    }
}

tasks.register("validateAllTargets") {
    group = "verification"
    description = "Builds the API, platform artifacts, validation mods, and repository policy checks."
    dependsOn "check", "spotlessCheck", "verifyCommonPurity", "validatePlatformDescriptors", "checkDocsLinks"
    dependsOn subprojects.findAll { it.tasks.findByName("check") != null }.collect { "${it.path}:check" }
    dependsOn platformTargets.collect { "${it.path}:build" }
    dependsOn([
            ":validation:fabric-1.20.1:build",
            ":validation:forge-1.20.1:build",
            ":validation:fabric-1.21.1:build",
            ":validation:neoforge-1.21.1:build"
    ])
}

tasks.named("check").configure {
    dependsOn "spotlessCheck", "verifyCommonPurity", "validatePlatformDescriptors", "checkDocsLinks"
}
