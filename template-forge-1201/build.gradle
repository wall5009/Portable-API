plugins {
    id 'net.neoforged.moddev.legacyforge'
}

legacyForge {
    version = providers.gradleProperty('forge_1201').get()
    validateAccessTransformers = true
    runs {
        client {
            client()
            gameDirectory = project.file('runs/template-forge-1201-client')
        }
        server {
            server()
            gameDirectory = project.file('runs/template-forge-1201-server')
        }
        data {
            data()
            gameDirectory = project.file('runs/template-forge-1201-data')
        }
        gameTestServer {
            type = 'gameTestServer'
            gameDirectory = project.file('runs/template-forge-1201-gametest')
        }
    }
    mods {
        portable_template {
            sourceSet sourceSets.main
            sourceSet project(':template-common').sourceSets.main
        }
        portable_api {
            sourceSet project(':platform-forge-1201').sourceSets.main
            sourceSet project(':api-core').sourceSets.main
            sourceSet project(':api-mc-1201').sourceSets.main
        }
    }
}

dependencies {
    implementation project(':template-common')
    implementation project(':platform-forge-1201')
}

tasks.named('processResources') {
    def resourceProperties = [
            mod_id: rootProject.ext.templateModId,
            mod_name: 'Portable Template',
            mod_version: project.version,
            api_mod_id: rootProject.ext.apiModId,
            minecraft_version: providers.gradleProperty('minecraft_1201').get(),
            forge_version: providers.gradleProperty('forge_1201').get()
    ]
    filteringCharset = 'UTF-8'
    inputs.properties(resourceProperties)

    filesMatching('META-INF/mods.toml') {
        expand(resourceProperties)
    }

    def processedMetadata = project.layout.buildDirectory.file('resources/main/META-INF/mods.toml')
    outputs.upToDateWhen {
        def metadataFile = processedMetadata.get().asFile
        !metadataFile.isFile() || !metadataFile.getText('UTF-8').contains('${')
    }

    doLast {
        def metadataFile = processedMetadata.get().asFile
        if (!metadataFile.isFile()) {
            throw new GradleException("Expected processed metadata was not created: ${metadataFile}")
        }
        if (metadataFile.getText('UTF-8').contains('${')) {
            throw new GradleException("Unresolved resource placeholder remains in ${metadataFile}")
        }
    }
}

tasks.named('jar') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from project(':template-common').sourceSets.main.output
}
